# A dataset with a single subject with multiple phase encoding directions and multiple runs of each.
# No field maps, no complicated metadata fields.
'01':
  - anat:
      - suffix: T1w
    dwi:
      - dir: AP
        run: 1
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'j-'
      - dir: AP
        run: 2
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'j-'
      - dir: PA
        run: 1
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'j'
      - dir: PA
        run: 2
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'j'
      - dir: RL
        run: 1
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'i-'
      - dir: RL
        run: 2
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'i-'
      - dir: LR
        run: 1
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'i'
      - dir: LR
        run: 2
        suffix: dwi
        metadata:
          PhaseEncodingDirection: 'i'
