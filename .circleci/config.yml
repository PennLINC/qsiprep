version: 2.1
orbs:
  codecov: codecov/codecov@4.1.0

_machine_defaults: &machine_defaults
  environment:
    TZ: "/usr/share/zoneinfo/America/New_York"
  machine:
    image: default
    docker_layer_caching: true
  working_directory: /tmp/src/qsiprep
  resource_class: large

_docker_auth: &docker_auth
  name: Docker authentication
  command: |
    if [[ -n "$DOCKERHUB_TOKEN" ]]; then
      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    fi

_setup_docker_registry: &setup_docker_registry
  name: Set up local Docker registry
  command: |
    if [[ -f /tmp/images/registry.tar.gz ]]; then
      docker load < /tmp/images/registry.tar.gz
    else
      docker pull registry:2
    fi
    docker run -d -p 5000:5000 --restart=always --name=registry \
      -v /tmp/docker:/var/lib/registry registry:2

_pull_from_registry: &pull_from_registry
  name: Pull and tag production image from local registry
  command: |
    docker pull localhost:5000/qsiprep
    docker tag localhost:5000/qsiprep pennlinc/qsiprep:latest

_pull_test_image: &pull_test_image
  name: Pull and tag test image from local registry
  command: |
    docker pull localhost:5000/qsiprep-test
    docker tag localhost:5000/qsiprep-test pennlinc/qsiprep:test

commands:
  restore_build_and_data:
    description: Restore Docker build cache and test data cache
    steps:
      - restore_cache:
          keys:
            - build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
            - data-v1--{{ .Revision }}
            - data-v1-{{ .Branch }}-
            - data-v1-master-
            - data-v1-
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_test_image

  run_integration_test:
    description: Run a pytest marker inside test image
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
      coverage_name:
        type: string
    steps:
      - run:
          name: Run qsiprep (<< parameters.marker >>)
          no_output_timeout: 5h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=<< parameters.cpus >> \
              -e COVERAGE_FILE=/coverage/.coverage.<< parameters.coverage_name >> \
              -v /tmp/src/qsiprep:/tmp/src/qsiprep:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsiprep \
              --entrypoint pytest \
              pennlinc/qsiprep:test \
              -rP -o log_cli=true -m "<< parameters.marker >>" \
              --cov-append --cov-report term-missing --cov=qsiprep \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsiprep
      - run:
          name: Clean large artifacts
          when: always
          command: |
            find /tmp/out/ -name "*.nii.gz" -type f -delete 2>/dev/null || true
            find /tmp/out/ -name "*.fib.gz" -type f -delete 2>/dev/null || true
      - store_artifacts:
          path: /tmp/out
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.<< parameters.coverage_name >>

jobs:
  image_prep:
    <<: *machine_defaults
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_cache:
          keys:
            - build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
            - build-v1-{{ .Branch }}-{{ .Revision }}
            - build-v1-master-
      - run: *docker_auth
      - run: *setup_docker_registry
      - run:
          name: Get base image information
          command: |
            export BASE_IMAGE=$( grep "BASE_IMAGE=" Dockerfile | head -1 | cut -d= -f2 )
            export BASE_IMAGE_NAME=${BASE_IMAGE%:*}
            export BASE_TAG=${BASE_IMAGE#*:}
            echo "BASE_IMAGE=$BASE_IMAGE" >> "$BASH_ENV"
            echo "BASE_IMAGE_NAME=$BASE_IMAGE_NAME" >> "$BASH_ENV"
            echo "BASE_TAG=$BASE_TAG" >> "$BASH_ENV"
      - run:
          name: Determine build requirements
          command: |
            if [[ -f /tmp/images/imageprep-success.marker ]]; then
              echo "BUILD_PRODUCTION_IMAGE=0" >> "$BASH_ENV"
              echo "BUILD_TEST_IMAGE=0" >> "$BASH_ENV"
            else
              echo "BUILD_PRODUCTION_IMAGE=1" >> "$BASH_ENV"
              echo "BUILD_TEST_IMAGE=1" >> "$BASH_ENV"
            fi
      - run:
          name: Build base image if needed
          no_output_timeout: 90m
          command: |
            if ! docker manifest inspect "$BASE_IMAGE" > /dev/null 2>&1; then
              docker build -f Dockerfile.base \
                --platform linux/amd64 \
                -t "$BASE_IMAGE" \
                -t "$BASE_IMAGE_NAME:latest" .
              echo "BASE_WAS_BUILT=1" >> "$BASH_ENV"
            else
              echo "BASE_WAS_BUILT=0" >> "$BASH_ENV"
            fi
      - run:
          name: Build production image
          no_output_timeout: 3h
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              if [[ -n "$CIRCLE_TAG" ]]; then THISVERSION="$CIRCLE_TAG"; else THISVERSION="0+build"; fi
              e=1 && for i in {1..5}; do
                docker build \
                  --target qsiprep \
                  --rm=false \
                  -t pennlinc/qsiprep:latest \
                  --platform linux/amd64 \
                  --build-arg BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                  --build-arg VCS_REF="$(git rev-parse --short HEAD)" \
                  --build-arg VERSION="$THISVERSION" . \
                && e=0 && break || sleep 15
              done && [ "$e" -eq "0" ]
            fi
      - run:
          name: Build test image
          no_output_timeout: 90m
          command: |
            if [[ "$BUILD_TEST_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker build --target test --rm=false -t pennlinc/qsiprep:test --platform linux/amd64 .
            elif docker image inspect pennlinc/qsiprep:test > /dev/null 2>&1; then
              echo "Reusing local test image."
            elif docker pull localhost:5000/qsiprep-test; then
              docker tag localhost:5000/qsiprep-test pennlinc/qsiprep:test
            else
              docker build --target test --rm=false -t pennlinc/qsiprep:test --platform linux/amd64 .
            fi
      - run:
          name: Verify images
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker run --rm pennlinc/qsiprep:latest --version
            fi
            docker run --rm --entrypoint pytest pennlinc/qsiprep:test --version
      - run:
          name: Push base image if newly built
          command: |
            if [[ "$BASE_WAS_BUILT" == "1" ]] && docker image inspect "$BASE_IMAGE" > /dev/null 2>&1; then
              if [[ -n "$DOCKERHUB_TOKEN" ]]; then
                docker push "$BASE_IMAGE"
                docker push "$BASE_IMAGE_NAME:latest"
              fi
            fi
      - run:
          name: Push images to local registry
          no_output_timeout: 40m
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker tag pennlinc/qsiprep:latest localhost:5000/qsiprep
              docker push localhost:5000/qsiprep
            fi
            docker tag pennlinc/qsiprep:test localhost:5000/qsiprep-test
            docker push localhost:5000/qsiprep-test
      - run:
          name: Docker registry garbage collection
          command: docker exec registry /bin/registry garbage-collect --delete-untagged /etc/docker/registry/config.yml
      - run:
          name: Record successful image prep
          command: |
            mkdir -p /tmp/images
            touch /tmp/images/imageprep-success.marker
            docker save registry:2 -o /tmp/images/registry.tar.gz
      - save_cache:
          key: build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
          paths:
            - /tmp/docker
            - /tmp/images

  get_data:
    <<: *machine_defaults
    steps:
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
            - data-v1--{{ .Revision }}
            - data-v1-{{ .Branch }}-
            - data-v1-master-
            - data-v1-
      - run:
          name: Download integration datasets
          command: |
            download_one() {
              local dset=$1
              local url=$2
              if [[ -d /tmp/data/${dset} ]]; then
                echo "${dset} data was cached"
                return 0
              fi
              mkdir -p /tmp/data/${dset}
              if [[ "${url}" == *.xz ]]; then
                wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 0 -q \
                  -O /tmp/${dset}.tar.xz "${url}" || return 1
                tar xJf /tmp/${dset}.tar.xz -C /tmp/data/${dset}
                rm -f /tmp/${dset}.tar.xz
              elif [[ "${url}" == *.gz ]]; then
                wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 0 -q \
                  -O /tmp/${dset}.tar.gz "${url}" || return 1
                tar xzf /tmp/${dset}.tar.gz -C /tmp/data/${dset}
                rm -f /tmp/${dset}.tar.gz
              else
                echo "Unknown file extension for ${dset}: ${url}"
                return 1
              fi
              echo "Downloaded ${dset}"
            }
            download_one HBCD 'https://upenn.box.com/shared/static/gn1ec8x7mtk1f07l97d0th9idn4qv3yx.xz'
            download_one DSCSDSI 'https://upenn.box.com/shared/static/eq6nvnyazi2zlt63uowqd0zhnlh6z4yv.xz'
            download_one DSCSDSI_BUDS 'https://upenn.box.com/shared/static/bvhs3sw2swdkdyekpjhnrhvz89x3k87t.xz'
            download_one DSDTI 'https://upenn.box.com/shared/static/iefjtvfez0c2oug0g1a9ulozqe5il5xy.xz'
            download_one twoses 'https://upenn.box.com/shared/static/c949fjjhhen3ihgnzhkdw5jympm327pp.xz'
            download_one multishell_output 'https://upenn.box.com/shared/static/hr7xnxicbx9iqndv1yl35bhtd61fpalp.xz'
            download_one singleshell_output 'https://upenn.box.com/shared/static/9jhf0eo3ml6ojrlxlz6lej09ny12efgg.gz'
            download_one drbuddi_rpe_series 'https://upenn.box.com/shared/static/j5mxts5wu0em1toafmrlzdndves1jnfv.xz'
            download_one drbuddi_epi 'https://upenn.box.com/shared/static/plyuee1nbj9v8eck03s38ojji8tkspwr.xz'
            download_one DSDTI_fmap 'https://upenn.box.com/shared/static/rxr6qbi6ezku9gw3esfpnvqlcxaw7n5n.gz'
            download_one DSCSDSI_fmap 'https://upenn.box.com/shared/static/l561psez1ojzi4p3a12eidaw9vbizwdc.gz'
            download_one maternal_brain_project 'https://upenn.box.com/shared/static/tkahg1ctipmfihvpa1gmibvcv0gb721h.xz'
            download_one forrest_gump 'https://upenn.box.com/shared/static/qat58an322bzzyixrrsk7cmf52q3bepq.xz'
      - save_cache:
          key: data-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - /tmp/data

  DSCSDSI:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: dscsdsi
          cpus: 4
          coverage_name: dscsdsi

  DSDTI_nofmap:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: dsdti_nofmap
          cpus: 4
          coverage_name: dsdti_nofmap

  DSDTI_synfmap:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: dsdti_synfmap
          cpus: 4
          coverage_name: dsdti_synfmap

  DRBUDDI_TENSORLine_EPI:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: drbuddi_tensorline_epi
          cpus: 4
          coverage_name: drbuddi_tensorline_epi

  DRBUDDI_SHORELine_EPI:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: drbuddi_shoreline_epi
          cpus: 4
          coverage_name: drbuddi_shoreline_epi

  DRBUDDI_eddy_rpe_series:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: drbuddi_rpe
          cpus: 4
          coverage_name: drbuddi_rpe

  maternal_brain_project:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: maternal_brain_project
          cpus: 4
          coverage_name: maternal_brain_project

  forrest_gump:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: forrest_gump
          cpus: 4
          coverage_name: forrest_gump

  forrest_gump_patch2self:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: forrest_gump_patch2self
          cpus: 4
          coverage_name: forrest_gump_patch2self

  synthstrip_synthseg_interfaces:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run_integration_test:
          marker: synthstrip or synthseg
          cpus: 4
          coverage_name: synthstrip_synthseg

  unit_tests:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run:
          name: Run unit tests
          no_output_timeout: 2h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=4 \
              -e COVERAGE_FILE=/coverage/.coverage.unit_tests \
              -v /tmp/src/qsiprep:/tmp/src/qsiprep:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsiprep \
              --entrypoint pytest \
              pennlinc/qsiprep:test \
              -n 4 -vv -o log_cli=true -m "not integration and not (synthstrip or synthseg)" \
              --cov-append --cov-branch --cov-report term-missing --cov=qsiprep \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsiprep
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.unit_tests

  IntramodalTemplate:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run:
          name: Run IntramodalTemplate script
          no_output_timeout: 2h
          command: |
            mkdir -p /tmp/out /tmp/work
            docker run --rm=false \
              -v /tmp/src/qsiprep:/tmp/src/qsiprep:ro \
              -v /tmp/data:/tmp/src/qsiprep/.circleci/data:ro \
              -v /tmp/out:/tmp/src/qsiprep/.circleci/out \
              -v /tmp/work:/tmp/src/qsiprep/.circleci/work \
              -w /tmp/src/qsiprep/.circleci \
              --entrypoint bash \
              pennlinc/qsiprep:test \
              IntramodalTemplate.sh

  MultiT1w:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_build_and_data
      - run:
          name: Run MultiT1w script
          no_output_timeout: 2h
          command: |
            mkdir -p /tmp/out /tmp/work
            docker run --rm=false \
              -v /tmp/src/qsiprep:/tmp/src/qsiprep:ro \
              -v /tmp/data:/tmp/src/qsiprep/.circleci/data:ro \
              -v /tmp/out:/tmp/src/qsiprep/.circleci/out \
              -v /tmp/work:/tmp/src/qsiprep/.circleci/work \
              -w /tmp/src/qsiprep/.circleci \
              --entrypoint bash \
              pennlinc/qsiprep:test \
              MultiT1w.sh

  merge_coverage:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - attach_workspace:
          at: /tmp/coverage
      - run:
          name: Merge coverage files
          command: |
            pyenv local 3
            pip install coverage
            cd /tmp/src/qsiprep
            coverage combine /tmp/coverage/
            coverage xml -o /tmp/coverage/coverage.xml
      - store_artifacts:
          path: /tmp/coverage
      - codecov/upload:
          file: /tmp/coverage/coverage.xml

  deployable:
    docker:
      - image: busybox:latest
    steps:
      - run: echo Deploying!

  deploy_docker:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_cache:
          keys:
            - build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_from_registry
      - run:
          name: Deploy to Docker Hub
          no_output_timeout: 40m
          command: |
            if [[ -n "$DOCKERHUB_TOKEN" ]]; then
              docker tag pennlinc/qsiprep:latest pennlinc/qsiprep:unstable
              docker push pennlinc/qsiprep:unstable
              if [[ -n "$CIRCLE_TAG" ]]; then
                docker tag pennlinc/qsiprep:latest pennlinc/qsiprep:$CIRCLE_TAG
                docker push pennlinc/qsiprep:latest
                docker push pennlinc/qsiprep:$CIRCLE_TAG
              fi
            fi

  deploy_pypi:
    docker:
      - image: cimg/python:3.10.9
    working_directory: /tmp/src/qsiprep
    steps:
      - checkout
      - run:
          name: Update build tools
          command: pip install --upgrade build twine
      - run:
          name: Build QSIPrep
          command: python -m build
      - run:
          name: Upload packages to PyPI
          command: python -m twine upload -u __token__ -p "${PYPI_PASS}" dist/qsiprep*

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - image_prep:
          filters:
            tags:
              only: /.*/
      - get_data:
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/
      - DSCSDSI:
          requires: [image_prep, get_data]
      - DSDTI_nofmap:
          requires: [image_prep, get_data]
      - DSDTI_synfmap:
          requires: [image_prep, get_data]
      - DRBUDDI_SHORELine_EPI:
          requires: [image_prep, get_data]
      - DRBUDDI_eddy_rpe_series:
          requires: [image_prep, get_data]
      - DRBUDDI_TENSORLine_EPI:
          requires: [image_prep, get_data]
      - maternal_brain_project:
          requires: [image_prep, get_data]
      - forrest_gump:
          requires: [image_prep, get_data]
      - forrest_gump_patch2self:
          requires: [image_prep, get_data]
      - unit_tests:
          requires: [image_prep, get_data]
      - IntramodalTemplate:
          requires: [image_prep, get_data]
      - MultiT1w:
          requires: [image_prep, get_data]
      - synthstrip_synthseg_interfaces:
          requires: [image_prep, get_data]
      - merge_coverage:
          requires:
            - DSCSDSI
            - DSDTI_nofmap
            - DSDTI_synfmap
            - DRBUDDI_SHORELine_EPI
            - DRBUDDI_eddy_rpe_series
            - DRBUDDI_TENSORLine_EPI
            - maternal_brain_project
            - forrest_gump
            - forrest_gump_patch2self
            - unit_tests
            - IntramodalTemplate
            - MultiT1w
            - synthstrip_synthseg_interfaces
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/
      - deployable:
          requires:
            - image_prep
            - DSCSDSI
            - DSDTI_nofmap
            - DSDTI_synfmap
            - DRBUDDI_SHORELine_EPI
            - DRBUDDI_eddy_rpe_series
            - DRBUDDI_TENSORLine_EPI
            - maternal_brain_project
            - forrest_gump
            - forrest_gump_patch2self
            - unit_tests
            - IntramodalTemplate
            - MultiT1w
            - synthstrip_synthseg_interfaces
          filters:
            branches:
              only: master
            tags:
              only: /.*/
      - deploy_docker:
          requires: [deployable]
          filters:
            branches:
              only: master
            tags:
              only: /.*/
      - deploy_pypi:
          requires: [deployable]
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /.*/
