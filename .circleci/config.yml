version: 2.1
orbs:
  codecov: codecov/codecov@4.1.0

# ── Reusable anchors ──────────────────────────────────────────────────

_machine_defaults: &machine_defaults
  environment:
    TZ: "/usr/share/zoneinfo/America/New_York"
  machine:
    image: default
    docker_layer_caching: true
  working_directory: /tmp/src/qsiprep
  resource_class: large

_docker_auth: &docker_auth
  name: Docker authentication
  command: |
    if [[ -n "$DOCKERHUB_TOKEN" ]]; then
      echo "$DOCKERHUB_TOKEN" | docker login -u $DOCKERHUB_USERNAME --password-stdin
    fi

_setup_docker_registry: &setup_docker_registry
  name: Set up local Docker registry
  command: |
    if [[ -f /tmp/images/registry.tar.gz ]]; then
      echo "Loading saved registry image"
      docker load < /tmp/images/registry.tar.gz
    else
      echo "Pulling registry image from DockerHub"
      docker pull registry:2
    fi
    docker run -d -p 5000:5000 --restart=always --name=registry \
        -v /tmp/docker:/var/lib/registry registry:2

_pull_test_image: &pull_test_image
  name: Pull and tag test image from local registry
  command: |
    docker pull localhost:5000/qsiprep-test
    docker tag localhost:5000/qsiprep-test pennlinc/qsiprep:test

# ── Reusable commands ─────────────────────────────────────────────────

commands:
  restore_build_and_data:
    description: Restore Docker image cache and test data cache, then start the registry
    steps:
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
            - build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_test_image

  run_integration_test:
    description: Run a pytest-marked integration test inside the test Docker image
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
    steps:
      - run:
          name: Run qsiprep (<< parameters.marker >>)
          no_output_timeout: 5h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=<< parameters.cpus >> \
              -e COVERAGE_FILE=/coverage/.coverage.<< parameters.marker >> \
              -v /tmp/src/qsiprep:/tmp/src/qsiprep:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsiprep \
              --entrypoint pytest \
              pennlinc/qsiprep:test \
              -rP -o log_cli=true -m "<< parameters.marker >>" \
              --cov-append --cov-report term-missing --cov=qsiprep \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsiprep
      - run:
          name: Clean up large artifacts
          when: always
          command: find /tmp/out/ -name "*.nii.gz" -type f -delete 2>/dev/null || true
      - store_artifacts:
          path: /tmp/out
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.<< parameters.marker >>

# ── Jobs ──────────────────────────────────────────────────────────────

jobs:
  image_prep:
    <<: *machine_defaults
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - restore_cache:
          keys:
            - build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
            - build-v3-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run:
          name: Get base image information
          command: |
            export BASE_IMAGE=$( grep "BASE_IMAGE=" Dockerfile | head -1 | cut -d= -f2 )
            export BASE_IMAGE_NAME=${BASE_IMAGE%:*}
            export BASE_TAG=${BASE_IMAGE#*:}
            echo "BASE_IMAGE=$BASE_IMAGE" >> $BASH_ENV
            echo "BASE_IMAGE_NAME=$BASE_IMAGE_NAME" >> $BASH_ENV
            echo "BASE_TAG=$BASE_TAG" >> $BASH_ENV
      - run:
          name: Determine whether test image build is required
          command: |
            if [[ -f /tmp/images/imageprep-success.marker ]]; then
              echo "BUILD_TEST_IMAGE=0" >> "$BASH_ENV"
            else
              echo "No successful cached image prep for current Docker inputs; rebuilding test image."
              echo "BUILD_TEST_IMAGE=1" >> "$BASH_ENV"
            fi
      - run:
          name: Build base image if needed
          no_output_timeout: 90m
          command: |
            if ! docker manifest inspect $BASE_IMAGE > /dev/null 2>&1; then
              echo "Base image $BASE_IMAGE not found, building..."
              docker build -f Dockerfile.base \
                --platform linux/amd64 \
                -t $BASE_IMAGE \
                -t $BASE_IMAGE_NAME:latest .
              echo "BASE_WAS_BUILT=1" >> "$BASH_ENV"
            else
              echo "Base image $BASE_IMAGE already exists."
              echo "BASE_WAS_BUILT=0" >> "$BASH_ENV"
            fi
      - run:
          name: Build Docker image (test)
          no_output_timeout: 90m
          command: |
            if [[ "$BUILD_TEST_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsiprep:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            elif docker image inspect pennlinc/qsiprep:test > /dev/null 2>&1; then
              echo "Reusing existing local test image (no Dockerfile/pixi/base-triggered rebuild required)."
            elif docker pull localhost:5000/qsiprep-test; then
              docker tag localhost:5000/qsiprep-test pennlinc/qsiprep:test
              echo "Reusing cached test image from local registry (no Dockerfile/pixi/base-triggered rebuild required)."
            else
              echo "No reusable test image found; rebuilding test image."
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/qsiprep:test \
                --platform linux/amd64 \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" .
            fi
      - run:
          name: Guard test image revision
          command: |
            EXPECTED_REF="$(git rev-parse --short HEAD)"
            IMAGE_REF="$(docker image inspect pennlinc/qsiprep:test --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
            echo "Expected test image ref: ${EXPECTED_REF}"
            echo "Actual test image ref: ${IMAGE_REF:-<missing>}"
            if [[ -z "$IMAGE_REF" || "$IMAGE_REF" != "$EXPECTED_REF" ]]; then
              echo "Test image revision does not match checkout. Refusing to run tests with stale image."
              exit 1
            fi
      - run:
          name: Verify test image
          command: docker run --rm --entrypoint pytest pennlinc/qsiprep:test --version
      - run:
          name: Push base image to Docker Hub (if newly built)
          command: |
            if [[ "$BASE_WAS_BUILT" == "1" ]] && docker image inspect $BASE_IMAGE > /dev/null 2>&1; then
              if [[ -n "$DOCKERHUB_TOKEN" ]]; then
                docker push $BASE_IMAGE
                docker push $BASE_IMAGE_NAME:latest
              fi
            fi
      - run:
          name: Push test image to local registry
          no_output_timeout: 40m
          command: |
            docker tag pennlinc/qsiprep:test localhost:5000/qsiprep-test
            docker push localhost:5000/qsiprep-test
      - run:
          name: Docker registry garbage collection
          command: |
            docker exec registry /bin/registry garbage-collect --delete-untagged \
              /etc/docker/registry/config.yml
      - run:
          name: Record successful image prep
          command: |
            mkdir -p /tmp/images
            touch /tmp/images/imageprep-success.marker
            docker save registry:2 -o /tmp/images/registry.tar.gz
      - save_cache:
          key: build-v4-{{ checksum "Dockerfile" }}-{{ checksum "pixi.lock" }}-{{ .Revision }}
          paths:
            - /tmp/docker
            - /tmp/images

  get_data:
    <<: *machine_defaults
    steps:
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
            - data-v1--{{ .Revision }}
            - data-v1-{{ .Branch }}-
            - data-v1-master-
            - data-v1-
      - run:
          name: Download integration datasets
          command: |
            download_one() {
              local dset=$1
              local url=$2
              if [[ -d /tmp/data/${dset} ]]; then
                echo "${dset} data was cached"
                return 0
              fi
              mkdir -p /tmp/data/${dset}
              if [[ "${url}" == *.xz ]]; then
                wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 0 -q \
                  -O /tmp/${dset}.tar.xz "${url}" || return 1
                tar xJf /tmp/${dset}.tar.xz -C /tmp/data/${dset}
                rm -f /tmp/${dset}.tar.xz
              elif [[ "${url}" == *.gz ]]; then
                wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 0 -q \
                  -O /tmp/${dset}.tar.gz "${url}" || return 1
                tar xzf /tmp/${dset}.tar.gz -C /tmp/data/${dset}
                rm -f /tmp/${dset}.tar.gz
              else
                echo "Unknown file extension for ${dset}: ${url}"
                return 1
              fi
              echo "Downloaded ${dset}"
            }
            download_one HBCD 'https://upenn.box.com/shared/static/gn1ec8x7mtk1f07l97d0th9idn4qv3yx.xz'
            download_one DSCSDSI 'https://upenn.box.com/shared/static/eq6nvnyazi2zlt63uowqd0zhnlh6z4yv.xz'
            download_one DSCSDSI_BUDS 'https://upenn.box.com/shared/static/bvhs3sw2swdkdyekpjhnrhvz89x3k87t.xz'
            download_one DSDTI 'https://upenn.box.com/shared/static/iefjtvfez0c2oug0g1a9ulozqe5il5xy.xz'
            download_one twoses 'https://upenn.box.com/shared/static/c949fjjhhen3ihgnzhkdw5jympm327pp.xz'
            download_one multishell_output 'https://upenn.box.com/shared/static/hr7xnxicbx9iqndv1yl35bhtd61fpalp.xz'
            download_one singleshell_output 'https://upenn.box.com/shared/static/9jhf0eo3ml6ojrlxlz6lej09ny12efgg.gz'
            download_one drbuddi_rpe_series 'https://upenn.box.com/shared/static/j5mxts5wu0em1toafmrlzdndves1jnfv.xz'
            download_one drbuddi_epi 'https://upenn.box.com/shared/static/plyuee1nbj9v8eck03s38ojji8tkspwr.xz'
            download_one DSDTI_fmap 'https://upenn.box.com/shared/static/rxr6qbi6ezku9gw3esfpnvqlcxaw7n5n.gz'
            download_one DSCSDSI_fmap 'https://upenn.box.com/shared/static/l561psez1ojzi4p3a12eidaw9vbizwdc.gz'
            download_one maternal_brain_project 'https://upenn.box.com/shared/static/tkahg1ctipmfihvpa1gmibvcv0gb721h.xz'
            download_one forrest_gump 'https://upenn.box.com/shared/static/qat58an322bzzyixrrsk7cmf52q3bepq.xz'
      - save_cache:
          key: data-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - /tmp/data

  # ── Integration tests ────────────────────────────────────────────────

  integration_test:
    <<: *machine_defaults
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 4
      skip_marker:
        type: string
        default: ""
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - run:
          name: Check whether build should be skipped
          command: |
            SKIP_MARKER="<< parameters.skip_marker >>"
            if [[ -z "$SKIP_MARKER" ]]; then SKIP_MARKER="<< parameters.marker >>"; fi
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?'"$SKIP_MARKER"'\]' )" != "" ]]; then
              echo "Skipping << parameters.marker >>"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: << parameters.marker >>
          cpus: << parameters.cpus >>

  # ── Unit tests ───────────────────────────────────────────────────────

  unit_tests:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - run:
          name: Check whether build should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?unit_tests\]' )" != "" ]]; then
              echo "Skipping unit_tests"
              circleci step halt
            fi
      - restore_build_and_data
      - run:
          name: Run unit tests
          no_output_timeout: 2h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm=false \
              -e CIRCLE_CPUS=4 \
              -e COVERAGE_FILE=/coverage/.coverage.unit_tests \
              -v /tmp/src/qsiprep:/tmp/src/qsiprep:ro \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/qsiprep \
              --entrypoint pytest \
              pennlinc/qsiprep:test \
              -n 4 -vv -o log_cli=true -m "not integration and not synthstrip" \
              --cov-append --cov-branch --cov-report term-missing --cov=qsiprep \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              qsiprep
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.unit_tests

  # ── Coverage & deployment ────────────────────────────────────────────

  merge_coverage:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - attach_workspace:
          at: /tmp/coverage
      - run:
          name: Merge coverage files
          command: |
            pyenv local 3
            pip install coverage
            cd /tmp/src/qsiprep
            coverage combine /tmp/coverage/
            coverage xml -o /tmp/coverage/coverage.xml
      - store_artifacts:
          path: /tmp/coverage
      - run:
          name: Quick fix for GPG error in Codecov
          command: mkdir -p ~/.gnupg
      - codecov/upload:
          file: /tmp/coverage/coverage.xml

  build_and_deploy_docker:
    <<: *machine_defaults
    environment:
      TZ: "/usr/share/zoneinfo/America/New_York"
      DOCKER_BUILDKIT: "1"
    steps:
      - checkout:
          path: /tmp/src/qsiprep
      - run: *docker_auth
      - run:
          name: Build Docker image (production)
          no_output_timeout: 3h
          command: |
            if [[ -n "$CIRCLE_TAG" ]]; then
              THISVERSION="$CIRCLE_TAG"
            else
              THISVERSION="0+build"
            fi
            e=1 && for i in {1..5}; do
              docker build \
                --target qsiprep \
                --rm=false \
                -t pennlinc/qsiprep:latest \
                --platform linux/amd64 \
                --build-arg BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                --build-arg VCS_REF="$(git rev-parse --short HEAD)" \
                --build-arg VERSION="$THISVERSION" . \
              && e=0 && break || sleep 15
            done && [ "$e" -eq "0" ]
      - run:
          name: Verify production image
          command: docker run --rm pennlinc/qsiprep:latest --version
      - run:
          name: Deploy to Docker Hub
          no_output_timeout: 40m
          command: |
            if [[ -n "$DOCKERHUB_TOKEN" ]]; then
              docker tag pennlinc/qsiprep:latest pennlinc/qsiprep:unstable
              docker push pennlinc/qsiprep:unstable
              if [[ -n "$CIRCLE_TAG" ]]; then
                docker tag pennlinc/qsiprep:latest pennlinc/qsiprep:$CIRCLE_TAG
                docker push pennlinc/qsiprep:latest
                docker push pennlinc/qsiprep:$CIRCLE_TAG
              fi
            fi

  deploy_pypi:
    docker:
      - image: cimg/python:3.10.9
    working_directory: /tmp/src/qsiprep
    steps:
      - checkout
      - run:
          name: Update build tools
          command: pip install --upgrade build twine
      - run:
          name: Build QSIPrep
          command: python -m build
      - run:
          name: Upload packages to PyPI
          command: python -m twine upload -u __token__ -p "${PYPI_PASS}" dist/qsiprep*

# ── Workflows ─────────────────────────────────────────────────────────

workflows:
  version: 2
  run_tests:
    jobs:
      - image_prep:
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - get_data:
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: DSCSDSI
          marker: dscsdsi
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: DSDTI_nofmap
          marker: dsdti_nofmap
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: DSDTI_synfmap
          marker: dsdti_synfmap
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: DRBUDDI_TENSORLine_EPI
          marker: drbuddi_tensorline_epi
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: DRBUDDI_SHORELine_EPI
          marker: drbuddi_shoreline_epi
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: DRBUDDI_eddy_rpe_series
          marker: drbuddi_rpe
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: maternal_brain_project
          marker: maternal_brain_project
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: forrest_gump
          marker: forrest_gump
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: forrest_gump_patch2self
          marker: forrest_gump_patch2self
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: synthstrip_synthseg_interfaces
          marker: synthstrip
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: IntramodalTemplate
          marker: intramodal_template
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - integration_test:
          name: MultiT1w
          marker: multi_t1w
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - unit_tests:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - merge_coverage:
          requires:
            - DSCSDSI
            - DSDTI_nofmap
            - DSDTI_synfmap
            - DRBUDDI_TENSORLine_EPI
            - DRBUDDI_SHORELine_EPI
            - DRBUDDI_eddy_rpe_series
            - maternal_brain_project
            - forrest_gump
            - forrest_gump_patch2self
            - synthstrip_synthseg_interfaces
            - IntramodalTemplate
            - MultiT1w
            - unit_tests
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - build_and_deploy_docker:
          requires:
            - image_prep
          filters:
            branches:
              only: master
            tags:
              only: /.*/

      - deploy_pypi:
          requires:
            - build_and_deploy_docker
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /.*/
